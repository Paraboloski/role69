name: Build

env:
  NODE_VERSION: 24

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: ./sheet

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dependency Init
        run: npm install --legacy-peer-deps

      - name: npm React
        run: npm run build

      - name: npm Electron
        run: npx electron-builder --publish=never

      - name: Clean release assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' || true)
          if [ -n "$assets" ]; then
            while read -r name; do
              [ -n "$name" ] && gh release delete-asset "$tag" "$name" -y
            done <<< "$assets"
          fi

      - name: Upload assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          files=(sheet/release/**/*Setup*.exe)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "No Windows setup exe found, skipping upload."
          fi

      - name: Upload assets (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          files=(sheet/release/**/*.dmg)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "No DMG found, skipping upload."
          fi

      - name: Upload assets (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          files=(sheet/release/**/*.AppImage)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "No AppImage found, skipping upload."
          fi
