name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  NODE_VERSION: 24
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./sheet
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - run: npx electron-builder --publish never
      - name: Cleanup release assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' || true)
          if [ -n "$assets" ]; then
            while read -r name; do
              [ -n "$name" ] && gh release delete-asset "$tag" "$name" -y
            done <<< "$assets"
          fi
      - name: Upload assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob globstar
          files=(release/*Setup*.exe release/*.dmg release/*.AppImage release/**/*Setup*.exe release/**/*.dmg release/**/*.AppImage)
          files=($(printf "%s\n" "${files[@]}" | grep -vE 'builder-debug\.yml|latest-.*\.yml'))
          if [ ${#files[@]} -eq 0 ]; then
            echo "No assets found."
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
