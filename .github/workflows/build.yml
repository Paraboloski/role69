name: Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  NODE_VERSION: 24

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Cleanup release assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' || true)
          if [ -n "$assets" ]; then
            while read -r name; do
              [ -n "$name" ] && gh release delete-asset "$tag" "$name" -y
            done <<< "$assets"
          fi

  release:
    runs-on: ${{ matrix.os }}
    needs: cleanup
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: ./sheet

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: Installa le dipendenze
        run: npm install --legacy-peer-deps

      - name: npm React
        run: npm run build

      - name: npm Electron
        run: npx electron-builder --publish never

      - name: Upload Windows Setup
        if: matrix.os == 'windows-latest'
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" release/**/*Setup*.exe --clobber

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" release/**/*.dmg --clobber

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" release/**/*.AppImage --clobber
