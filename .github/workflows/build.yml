name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_VERSION: 24

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Release
        run: |
          gh release delete ${{ github.ref_name }} --repo ${{ github.repository }} --yes || true
          gh release create ${{ github.ref_name }} --repo ${{ github.repository }} --title "${{ github.ref_name }}"
          
  release:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./sheet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - run: npm install --legacy-peer-deps
      
      - run: npm run build
      - run: npx electron-builder --publish never
      
      - name: Upload
        shell: bash
        run: |
          for file in release/*setup*.exe release/*.dmg release/*.AppImage; do
            if [ -f "$file" ]; then
              gh release upload ${{ github.ref_name }} "$file" --repo ${{ github.repository }} --clobber
            fi
          done

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: ./sheet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - name: format
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./sheet/dist
          
      - name: publish
        id: deployment
        uses: actions/deploy-pages@v4
